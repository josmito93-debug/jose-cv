<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Transformer Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; object-fit: cover; }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-family: 'Outfit', sans-serif; z-index: 10;
        }
        .loading-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ffffff; margin-left: 5px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 0.3; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }
    </style>
</head>
<body>
    <div id="loader">
        <div style="font-size: 14px; letter-spacing: 2px; text-transform: uppercase;">Booting OS <span class="loading-dot"></span></div>
    </div>
    <canvas id="transformerCanvas"></canvas>

    <script>
        const canvas = document.getElementById('transformerCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const loader = document.getElementById('loader');
        const totalFrames = 191;
        const images = [];
        let loadedCount = 0;

        function resize() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
        }

        window.addEventListener('resize', resize);
        resize();

        // Optimized Preloading
        for (let i = 1; i <= totalFrames; i++) {
            const img = new Image();
            img.onload = () => {
                loadedCount++;
                if (loadedCount === Math.min(totalFrames, 30)) {
                    // Start animation early once first 30 frames load to feel faster
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 300);
                    startAnimation();
                }
            };
            img.src = `/images/transformer-sequence/${i}.jpg`;
            images.push(img);
        }

        let currentFrame = 0;
        function startAnimation() {
            function render() {
                const img = images[currentFrame];
                if (img && img.complete) {
                    const canvasAspect = canvas.width / canvas.height;
                    const imgAspect = img.width / img.height;
                    let drawWidth, drawHeight, x, y;

                    if (canvasAspect > imgAspect) {
                        drawWidth = canvas.width;
                        drawHeight = canvas.width / imgAspect;
                        x = 0;
                        y = -(drawHeight - canvas.height) / 2;
                    } else {
                        drawHeight = canvas.height;
                        drawWidth = canvas.height * imgAspect;
                        x = -(drawWidth - canvas.width) / 2;
                        y = 0;
                    }

                    // Use clearRect for performance before draw
                    ctx.drawImage(img, x, y, drawWidth, drawHeight);
                }

                currentFrame++;
                
                if (currentFrame < totalFrames) {
                    requestAnimationFrame(render);
                } else {
                    // Stop exactly at the last frame and signal parent
                    currentFrame = totalFrames - 1; // stay on last frame
                    // Make sure we draw the absolute last frame
                    const finalImg = images[currentFrame];
                    if (finalImg && finalImg.complete) {
                        // (already drawn by previous cycle, but ensures we hold it)
                    }
                    window.parent.postMessage('TRANSFORM_COMPLETE', '*');
                }
            }
            requestAnimationFrame(render);
        }

        // Fallback: if loading takes too long (> 6 seconds), just tell the parent to bypass
        setTimeout(() => {
            if (currentFrame === 0) {
               window.parent.postMessage('TRANSFORM_COMPLETE', '*');
            }
        }, 6000);
    </script>
</body>
</html>
