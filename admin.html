<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JF.OS Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0e131f; color: white; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .admin-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 50px; border-radius: 20px; text-align: center; max-width: 500px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; letter-spacing: 5px; margin-bottom: 30px; color: #6366f1; text-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        .btn-group { display: flex; flex-direction: column; gap: 20px; }
        .admin-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; font-size: 0.9rem; }
        .admin-btn:hover { background: #6366f1; box-shadow: 0 0 30px rgba(99, 102, 241, 0.5); border-color: transparent; scale: 1.05; }
        .status { margin-top: 30px; font-size: 0.75rem; opacity: 0.5; color: #3efc8e; }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h1>ADMIN PORTAL | JF.OS</h1>
        <div class="btn-group">
            <a href="/" class="admin-btn">Ver Portafolio (Hero)</a>
            <a href="/dashboard" class="admin-btn">Trading Ecosystem Dashboard</a>
            <a href="/showcase" class="admin-btn">Ver Cinematic Showcase</a>
            <a href="https://vercel.com/dashboard" target="_blank" class="admin-btn">Vercel Console</a>
        </div>
        <div class="status">SYSTEMS ONLINE // ALPHA STATUS READY</div>
    </div>
</body>
</html>
