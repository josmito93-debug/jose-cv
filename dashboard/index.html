<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JF.OS | Quantitative Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #a855f7;
        --primary-glow: rgba(168, 85, 247, 0.4);
        --bg-dark: #050510;
        --card-bg: rgba(15, 12, 35, 0.6);
        --border: rgba(168, 85, 247, 0.2);
        --text: #ffffff;
        --text-dim: rgba(255, 255, 255, 0.4);
      }

      /* ── Reset Scoped to Login ──────────────────────────────── */
      .login-mode, .login-mode * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #080810;
        color: #fff;
        font-family: 'Outfit', 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }

      /* Scoped Login Container */
      .login-mode {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-dark);
        overflow: hidden;
      }

      /* Animated Background Mesh */
      .bg-mesh {
        position: fixed;
        inset: 0;
        z-index: -1;
        background: 
          radial-gradient(circle at 20% 30%, rgba(120, 60, 255, 0.15), transparent 40%),
          radial-gradient(circle at 80% 70%, rgba(80, 40, 220, 0.1), transparent 40%),
          radial-gradient(circle at 50% 50%, rgba(20, 10, 60, 1), #050510);
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image: 
          linear-gradient(rgba(168, 85, 247, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(168, 85, 247, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: -1;
        mask-image: radial-gradient(circle at center, black, transparent 80%);
      }

      /* ── Login Gate ─────────────────────────────────────────── */
      #login-gate {
        width: 100%;
        max-width: 440px;
        padding: 20px;
        animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .login-card {
        background: var(--card-bg);
        backdrop-filter: blur(28px) saturate(180%);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: 
          0 20px 50px rgba(0, 0, 0, 0.5),
          0 0 40px rgba(168, 85, 247, 0.1);
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .login-card:hover {
        border-color: rgba(168, 85, 247, 0.4);
        box-shadow: 
          0 25px 60px rgba(0, 0, 0, 0.6),
          0 0 50px rgba(168, 85, 247, 0.15);
      }

      .lock-icon-container {
        position: relative;
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
      }

      .lock-icon {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(168, 85, 247, 0.05));
        border: 1px solid var(--border);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }

      .lock-glow {
        position: absolute;
        inset: -4px;
        background: var(--primary);
        filter: blur(12px);
        opacity: 0.2;
        border-radius: 20px;
        z-index: -1;
      }

      .login-badge {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--primary);
        text-transform: uppercase;
        margin-bottom: 8px;
        padding: 6px 16px;
        background: rgba(168, 85, 247, 0.1);
        border: 1px solid rgba(168, 85, 247, 0.2);
        border-radius: 100px;
      }

      .login-card h1 {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 8px;
        background: linear-gradient(to bottom, #fff, #b68fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .login-card p {
        font-size: 0.85rem;
        color: var(--text-dim);
        margin-bottom: 32px;
      }

      .input-wrapper {
        position: relative;
        margin-bottom: 20px;
      }

      .input-wrapper input {
        width: 100%;
        padding: 16px 20px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        color: #fff;
        font-size: 1rem;
        font-family: inherit;
        outline: none;
        transition: all 0.3s ease;
      }

      .input-wrapper input:focus {
        border-color: var(--primary);
        background: rgba(168, 85, 247, 0.05);
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
      }

      .input-wrapper input.error {
        border-color: #ef4444;
        animation: shake 0.4s ease;
      }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-8px); }
        75% { transform: translateX(8px); }
      }

      .toggle-pw {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        opacity: 0.5;
        font-size: 1.2rem;
        transition: opacity 0.2s;
      }

      .toggle-pw:hover { opacity: 1; }

      .login-btn {
        width: 100%;
        padding: 16px;
        background: var(--primary);
        border: none;
        border-radius: 14px;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 25px var(--primary-glow);
      }

      .login-btn:hover {
        background: #9333ea;
        transform: translateY(-2px);
        box-shadow: 0 15px 30px var(--primary-glow);
      }

      .login-btn:active { transform: translateY(0); }

      .error-msg {
        height: 20px;
        font-size: 0.8rem;
        color: #ef4444;
        margin-top: 12px;
      }

      .login-footer {
        margin-top: 32px;
        font-size: 0.75rem;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 0.05em;
      }

      /* ── Dashboard App Container ───────────────────────────── */
      #app-content {
        display: none;
        position: relative;
        z-index: 1;
        /* Increase padding to ensure components don't touch edges */
        padding: 32px;
        min-height: 100vh;
        box-sizing: border-box;
      }
      #app-content.visible { display: block; }

      #root {
        min-height: calc(100vh - 64px);
      }

    </style>
  </head>
  <body>

    <!-- ── Login Gate ───────────────────────────────────────── -->
    <div id="login-wrapper" class="login-mode">
      <div class="bg-mesh"></div>
      <div class="bg-grid"></div>

      <div id="login-gate">
        <div class="login-card">
          <div class="lock-icon-container">
            <div class="lock-glow"></div>
            <div class="lock-icon">🔐</div>
          </div>
          <div class="login-badge">Encrypted Session</div>
          <h1>JF.OS Dashboard</h1>
          <p>Quantum-grade systems access</p>

          <div class="input-wrapper">
            <input
              type="password"
              id="pw-input"
              placeholder="Access key"
              autocomplete="off"
              spellcheck="false"
            />
            <button class="toggle-pw" id="toggle-pw" title="Show/hide">👁</button>
          </div>

          <button class="login-btn" id="login-btn">Initialize Connection →</button>
          <div class="error-msg" id="error-msg"></div>

          <div class="login-footer">QUANTRIC SYSTEMS &nbsp;·&nbsp; v1.2.0</div>
        </div>
      </div>
    </div>

    <!-- ── Actual Dashboard App ──────────────────────────────── -->
    <div id="app-content">
      <div id="root"></div>
    </div>

    <script>
      (function () {
        const CORRECT = '10580360Jm!';
        const SESSION_KEY = 'jf_fin_unlocked';

        const wrapper = document.getElementById('login-wrapper');
        const gate    = document.getElementById('login-gate');
        const appDiv  = document.getElementById('app-content');
        const input   = document.getElementById('pw-input');
        const btn     = document.getElementById('login-btn');
        const errMsg  = document.getElementById('error-msg');
        const toggle  = document.getElementById('toggle-pw');

        toggle.addEventListener('click', () => {
          const isText = input.type === 'text';
          input.type = isText ? 'password' : 'text';
          toggle.textContent = isText ? '👁' : '🙈';
        });

        function unlock() {
          const val = input.value;
          if (val === CORRECT) {
            sessionStorage.setItem(SESSION_KEY, '1');
            wrapper.style.display = 'none';
            loadApp();
          } else {
            errMsg.textContent = 'Invalid access signature.';
            input.classList.add('error');
            input.value = '';
            setTimeout(() => {
              input.classList.remove('error');
              errMsg.textContent = '';
            }, 2000);
          }
        }

        function loadApp() {
          appDiv.classList.add('visible');
          document.body.style.overflow = 'auto';
          document.body.style.display = 'block';
          
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.crossOrigin = '';
          link.href = '/dashboard/assets/index-BAR3_2kJ.css';
          document.head.appendChild(link);

          const script = document.createElement('script');
          script.type = 'module';
          script.crossOrigin = '';
          script.src = '/dashboard/assets/index-CaY0__8U.js';
          document.head.appendChild(script);
        }

        if (sessionStorage.getItem(SESSION_KEY) === '1') {
          wrapper.style.display = 'none';
          loadApp();
        }

        btn.addEventListener('click', unlock);
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') unlock();
        });
      })();
    </script>


  </body>
</html>
