name: Deploy Client Website to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client ID for deployment tracking'
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLIENT_ID: ${{ github.event.inputs.client_id || 'default' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Website deployed successfully!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
          
      - name: Update deployment status
        if: github.event.inputs.client_id
        run: |
          curl -X POST \
            "${{ github.api_url }}/repos/${{ github.repository }}/deployments" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{
              "ref": "${{ github.ref }}",
              "environment": "production",
              "description": "Deploy for client ${{ github.event.inputs.client_id }}",
              "payload": {
                "client_id": "${{ github.event.inputs.client_id }}",
                "deployment_url": "${{ steps.deployment.outputs.page_url }}"
              }
            }'